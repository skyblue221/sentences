<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장 수집함</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #7eb8d4;
    --blue-light: #c8e4f0;
    --blue-pale: #eaf4f9;
    --blue2: #89c4d4;
    --blue2-light: #cce8f0;
    --blue2-pale: #e8f5f9;
    --sage: #a0c8d8;
    --text-dark: #1a2e38;
    --text-mid: #3a5a6a;
    --text-soft: #6a94a8;
    --bg: #f4f9fc;
    --card-bg: #fafdff;
    --border: #c0dce8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-dark);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 20%, rgba(126,184,212,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 500px 350px at 85% 75%, rgba(137,196,212,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 10;
    padding: 36px 48px 0;
    display: flex; align-items: baseline; gap: 16px;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.3em;
    color: var(--text-soft); text-transform: uppercase;
  }

  .app-subtitle {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 300;
    color: var(--text-mid); letter-spacing: 0.05em;
  }

  nav {
    position: relative; z-index: 10;
    padding: 28px 48px 0;
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 10px 22px; font-size: 13px; font-weight: 300;
    color: var(--text-soft); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.25s; letter-spacing: 0.06em;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab:hover { color: var(--text-mid); }
  .tab.active { color: var(--text-dark); border-bottom-color: var(--blue); font-weight: 400; }

  main {
    position: relative; z-index: 10;
    padding: 40px 48px;
    max-width: 900px; margin: 0 auto;
  }

  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-label {
    font-size: 11px; letter-spacing: 0.25em; color: var(--text-soft);
    text-transform: uppercase; margin-bottom: 20px;
    font-family: 'Playfair Display', serif;
  }

  /* 랜덤 카드 */
  .feature-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 52px 56px;
    position: relative; overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer; min-height: 220px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .feature-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--blue2), var(--sage));
    opacity: 0.7;
  }
  .feature-card::after {
    content: '"'; position: absolute; top: 28px; right: 40px;
    font-family: 'Playfair Display', serif; font-size: 96px;
    color: var(--blue-light); line-height: 1; pointer-events: none;
  }
  .feature-card:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(62,120,155,0.1); }

  .card-sentence {
    font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 300;
    line-height: 1.9; color: var(--text-dark); letter-spacing: 0.04em;
    flex: 1; padding-right: 60px; transition: opacity 0.3s;
  }
  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
  }
  .card-source { font-size: 12px; color: var(--text-soft); letter-spacing: 0.08em; }
  .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .refresh-btn {
    margin-top: 16px; display: flex; align-items: center; gap: 8px;
    background: none; border: 1px solid var(--border); border-radius: 24px;
    padding: 8px 20px; font-size: 12px; color: var(--text-soft);
    cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.05em;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--text-mid); background: var(--blue-pale); }

  /* 태그 */
  .tag { padding: 3px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 0.06em; font-weight: 300; }
  .tag-blue { background: var(--blue-light); color: #1a5a7a; }
  .tag-blue2 { background: var(--blue2-light); color: #1a5a6a; }
  .tag-sage { background: #cce8f0; color: #1a5a70; }

  /* 카드 목록 */
  .collection-grid { display: grid; gap: 16px; }

  .sentence-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px 32px;
    transition: all 0.2s; cursor: pointer;
  }
  .sentence-card:hover { border-color: var(--blue); box-shadow: 0 4px 20px rgba(62,120,155,0.08); }

  .sentence-text {
    font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 300;
    line-height: 1.85; color: var(--text-dark); letter-spacing: 0.03em; margin-bottom: 16px;
  }
  .sentence-meta { display: flex; align-items: center; justify-content: space-between; }
  .source-info { font-size: 12px; color: var(--text-soft); }

  .action-btn {
    background: none; border: none; cursor: pointer;
    padding: 4px 6px; border-radius: 6px; transition: background 0.2s; color: var(--text-soft);
  }
  .action-btn:hover { background: var(--blue-pale); }
  .star-btn { font-size: 16px; }
  .starred { color: #d4b060; }

  .note-preview {
    margin-top: 14px; padding: 12px 16px;
    background: var(--blue-pale); border-radius: 8px;
    font-size: 13px; color: var(--text-mid); line-height: 1.7;
  }

  /* 입력 폼 */
  .add-form {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 44px;
  }

  .form-row { margin-bottom: 24px; }

  .form-label {
    display: block; font-size: 11px; letter-spacing: 0.18em;
    color: var(--text-soft); text-transform: uppercase; margin-bottom: 10px;
    font-family: 'Playfair Display', serif;
  }

  .form-input, .form-textarea {
    width: 100%; background: var(--blue-pale); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: 15px;
    font-family: 'Noto Serif KR', serif; font-weight: 300; color: var(--text-dark);
    transition: border-color 0.2s, background 0.2s; outline: none;
    -webkit-appearance: none; appearance: none; box-sizing: border-box;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--blue); background: white; }
  .form-textarea { min-height: 120px; resize: vertical; line-height: 1.8; }
  .form-date { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; cursor: pointer; }

  .tag-selector { display: flex; gap: 10px; flex-wrap: wrap; }
  .tag-option {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    background: white; color: var(--text-soft); font-family: 'Noto Sans KR', sans-serif;
  }
  .tag-option.selected { border-color: var(--blue); background: var(--blue-light); color: #1a5a7a; }

  .submit-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--blue), var(--blue2));
    border: none; border-radius: 12px; color: white; font-size: 14px;
    letter-spacing: 0.12em; cursor: pointer; transition: opacity 0.2s, transform 0.2s;
    font-family: 'Noto Sans KR', sans-serif; margin-top: 8px;
  }
  .submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 검색/필터 */
  .filter-bar { display: flex; gap: 12px; margin-bottom: 28px; align-items: center; flex-wrap: wrap; }

  .search-input {
    flex: 1; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 18px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-dark);
    outline: none; transition: border-color 0.2s; min-width: 140px;
  }
  .search-input:focus { border-color: var(--blue); }

  .filter-tag {
    padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; cursor: pointer; background: white; color: var(--text-soft);
    transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
  }
  .filter-tag.active { background: var(--blue-light); border-color: var(--blue); color: #1a5a7a; }

  /* 카운트 배지 */
  .count-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--blue-light); color: #1a5a7a;
    border-radius: 12px; padding: 2px 10px; font-size: 11px; margin-left: 8px;
  }

  /* 빈 상태 */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-soft); }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 14px; line-height: 2; font-weight: 300; }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,46,56,0.35); backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.25s ease; }

  .modal {
    background: var(--card-bg); border-radius: 24px; padding: 48px;
    max-width: 540px; width: 90%; position: relative; border: 1px solid var(--border);
  }
  .modal-close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text-soft); transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text-dark); }

  .modal-sentence {
    font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 300;
    line-height: 1.9; color: var(--text-dark); margin-bottom: 28px;
  }
  .modal-note-label {
    font-size: 11px; letter-spacing: 0.2em; color: var(--text-soft);
    text-transform: uppercase; margin-bottom: 10px;
    font-family: 'Playfair Display', serif;
  }
  .modal-existing-note {
    font-size: 14px; color: var(--text-mid); line-height: 1.7;
    padding: 14px 18px; background: var(--blue2-pale);
    border-radius: 10px; margin-bottom: 20px;
  }
  .modal-note-input {
    width: 100%; background: var(--blue-pale); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-dark);
    outline: none; min-height: 80px; resize: none; line-height: 1.7;
    transition: border-color 0.2s;
  }
  .modal-note-input:focus { border-color: var(--blue); background: white; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .modal-save-btn {
    padding: 12px 28px; background: var(--blue);
    border: none; border-radius: 10px; color: white; font-size: 13px;
    cursor: pointer; transition: opacity 0.2s;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.06em;
  }
  .modal-save-btn:hover { opacity: 0.85; }

  /* 로딩 */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(244,249,252,0.75);
    backdrop-filter: blur(4px); z-index: 50;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  .loading-dot {
    width: 32px; height: 32px; border: 2px solid var(--blue);
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 13px; color: var(--text-mid); font-weight: 300; letter-spacing: 0.08em; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 스피너 */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 6px;
  }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-dark); color: white; padding: 12px 24px;
    border-radius: 24px; font-size: 13px; opacity: 0;
    transition: all 0.3s; z-index: 200; pointer-events: none;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.04em;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #7a3a3a; }

  @media (max-width: 640px) {
    header { padding: 24px 20px 0; }
    nav { padding: 20px 20px 0; }
    main { padding: 28px 20px; }
    .feature-card { padding: 36px 28px; }
    .card-sentence { font-size: 17px; padding-right: 40px; }
    .add-form { padding: 28px 24px; }
    .modal { padding: 36px 24px; }
    .modal-sentence { font-size: 17px; }
  }
</style>
</head>
<body>

<header>
  <span class="app-title">Anthology</span>
  <span class="app-subtitle">나의 문장 수집함</span>
</header>

<nav>
  <button class="tab active" onclick="showPage('home', this)">오늘의 문장</button>
  <button class="tab" onclick="showPage('collection', this)">수집함 <span class="count-badge" id="countBadge">—</span></button>
  <button class="tab" onclick="showPage('add', this)">문장 추가</button>
</nav>

<main>

  <!-- 홈 -->
  <div class="page active" id="page-home">
    <div style="margin-bottom:48px;">
      <div class="section-label">오늘 꺼내 본 문장</div>
      <div class="feature-card" onclick="openModalById(currentModalId)">
        <div class="card-sentence" id="randomSentence">불러오는 중...</div>
        <div class="card-meta">
          <div class="card-source" id="randomSource"></div>
          <div class="card-tags" id="randomTags"></div>
        </div>
      </div>
      <button class="refresh-btn" onclick="showRandom()">↻ 다른 문장 보기</button>
    </div>
    <div>
      <div class="section-label">최근 수집</div>
      <div id="recentPreview"></div>
    </div>
  </div>

  <!-- 수집함 -->
  <div class="page" id="page-collection">
    <div class="filter-bar">
      <input class="search-input" type="text" placeholder="문장, 출처로 검색..." id="searchInput" oninput="renderCollection()">
      <button class="filter-tag active" onclick="setFilter('전체', this)">전체</button>
      <button class="filter-tag" onclick="setFilter('일상', this)">일상</button>
      <button class="filter-tag" onclick="setFilter('문학', this)">문학</button>
      <button class="filter-tag" onclick="setFilter('시', this)">시</button>
      <button class="filter-tag" onclick="setFilter('영화', this)">영화</button>
    </div>
    <div class="collection-grid" id="collectionGrid"></div>
  </div>

  <!-- 문장 추가 -->
  <div class="page" id="page-add">
    <div class="add-form">
      <div class="section-label" style="margin-bottom:28px;">새 문장 기록하기</div>
      <div class="form-row">
        <label class="form-label">문장</label>
        <textarea class="form-textarea" id="inputSentence" placeholder="마음에 닿은 문장을 여기에..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">출처</label>
        <input class="form-input" type="text" id="inputSource" placeholder="책, 영화, 일상...">
      </div>
      <div class="form-row">
        <label class="form-label">날짜</label>
        <input class="form-input form-date" type="date" id="inputDate">
      </div>
      <div class="form-row">
        <label class="form-label">분류</label>
        <div class="tag-selector">
          <button class="tag-option" onclick="toggleTag(this,'일상')">일상</button>
          <button class="tag-option" onclick="toggleTag(this,'문학')">문학</button>
          <button class="tag-option" onclick="toggleTag(this,'시')">시</button>
          <button class="tag-option" onclick="toggleTag(this,'영화')">영화</button>
          <button class="tag-option" onclick="toggleTag(this,'음악')">음악</button>
          <button class="tag-option" onclick="toggleTag(this,'사유')">사유</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">감상 메모</label>
        <textarea class="form-textarea" id="inputNote" placeholder="이 문장이 마음에 닿은 이유..." style="min-height:80px;"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="addSentence()">문장 수집하기</button>
    </div>
  </div>

</main>

<!-- 감상 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-sentence" id="modalSentence"></div>
    <div id="modalExistingNote" style="display:none;">
      <div class="modal-note-label">감상 메모</div>
      <div class="modal-existing-note" id="modalNoteText"></div>
    </div>
    <div class="modal-note-label">감상 추가</div>
    <textarea class="modal-note-input" id="modalNote" placeholder="오늘의 감상을 남겨보세요..."></textarea>
    <div class="modal-footer">
      <button class="modal-save-btn" onclick="saveNote()">저장</button>
      <button class="action-btn star-btn" id="modalStarBtn" onclick="toggleStar()" style="font-size:22px;">☆</button>
    </div>
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay" style="display:none;">
  <div class="loading-dot"></div>
  <div class="loading-text">불러오는 중...</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhxFT-zzg8d93FXQ6drRjClEp-DQwBNgjT1h6k-9eRzQqeNTtwnGxKVpYFCv-1keek/exec';

let sentences = [];
let currentFilter = '전체';
let currentModalId = null;
let selectedTags = [];

document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

// ── 데이터 불러오기 ──
async function loadSentences() {
  showLoading(true);
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const data = await res.json();
    sentences = (data || []).map(s => ({
      id: String(s.id || Date.now()),
      text: s.text || '',
      source: s.source || '',
      tags: s.tags ? s.tags.split(',').filter(Boolean) : [],
      date: s.date || '',
      note: s.note || '',
      starred: s.starred === 'true' || s.starred === true
    }));
    localStorage.setItem('sentences_cache', JSON.stringify(sentences));
  } catch(e) {
    // 오프라인이면 캐시 사용
    sentences = JSON.parse(localStorage.getItem('sentences_cache') || '[]');
    if (sentences.length) showToast('오프라인 — 캐시 데이터를 표시해요');
  } finally {
    showLoading(false);
    updateCount();
    showRandom();
    renderRecent();
  }
}

// ── 문장 추가 ──
async function addSentence() {
  const text = document.getElementById('inputSentence').value.trim();
  if (!text) { showToast('문장을 입력해주세요.', true); return; }

  const newItem = {
    id: String(Date.now()),
    text,
    source: document.getElementById('inputSource').value.trim(),
    date: document.getElementById('inputDate').value,
    note: document.getElementById('inputNote').value.trim(),
    tags: [...selectedTags],
    starred: false
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>저장 중...';

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'add', ...newItem, tags: newItem.tags.join(',') })
    });
    sentences.unshift(newItem);
    localStorage.setItem('sentences_cache', JSON.stringify(sentences));
    updateCount();
    resetForm();
    showToast('✦ 저장됐어요');
    showPage('home', document.querySelector('.tab'));
    showRandom();
    renderRecent();
  } catch(e) {
    showToast('저장 실패. 다시 시도해주세요.', true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '문장 수집하기';
  }
}

function resetForm() {
  document.getElementById('inputSentence').value = '';
  document.getElementById('inputSource').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  selectedTags = [];
  document.querySelectorAll('.tag-option').forEach(b => b.classList.remove('selected'));
}

// ── 즐겨찾기 ──
async function toggleStarById(e, id) {
  e.stopPropagation();
  const s = sentences.find(s => s.id === id);
  if (!s) return;
  s.starred = !s.starred;
  localStorage.setItem('sentences_cache', JSON.stringify(sentences));
  renderCollection();
  renderRecent();
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'update', id, starred: s.starred })
    });
  } catch(e) {}
}

// ── 랜덤 카드 ──
function showRandom() {
  if (!sentences.length) {
    document.getElementById('randomSentence').textContent = '아직 수집된 문장이 없어요. 마음에 닿은 문장을 추가해 보세요.';
    document.getElementById('randomSource').textContent = '';
    document.getElementById('randomTags').innerHTML = '';
    currentModalId = null;
    return;
  }
  const s = sentences[Math.floor(Math.random() * sentences.length)];
  const el = document.getElementById('randomSentence');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = s.text;
    document.getElementById('randomSource').textContent = s.source ? '— ' + s.source : '';
    document.getElementById('randomTags').innerHTML = s.tags.map(t => `<span class="tag ${tagClass(t)}">${t}</span>`).join('');
    el.style.transition = 'opacity 0.4s';
    el.style.opacity = '1';
    currentModalId = s.id;
  }, 180);
}

// ── 렌더링 ──
function tagClass(tag) {
  return { '일상':'tag-sage', '문학':'tag-blue', '시':'tag-blue', '영화':'tag-blue2', '음악':'tag-blue2', '사유':'tag-blue' }[tag] || 'tag-blue';
}

function cardHTML(s) {
  const id = s.id.replace(/'/g, "\\'");
  return `<div class="sentence-card" onclick="openModalById('${id}')">
    <div class="sentence-text">${s.text}</div>
    <div class="sentence-meta">
      <div class="source-info">${s.source ? '— ' + s.source : ''}<span style="margin-left:8px;opacity:0.6;">${s.date || ''}</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="display:flex;gap:6px;">${s.tags.map(t => `<span class="tag ${tagClass(t)}">${t}</span>`).join('')}</div>
        <button class="action-btn star-btn ${s.starred ? 'starred' : ''}" onclick="toggleStarById(event,'${id}')">${s.starred ? '★' : '☆'}</button>
      </div>
    </div>
    ${s.note ? `<div class="note-preview">${s.note}</div>` : ''}
  </div>`;
}

function renderRecent() {
  const el = document.getElementById('recentPreview');
  const recent = [...sentences].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)).slice(0, 2);
  el.innerHTML = recent.length
    ? `<div class="collection-grid">${recent.map(cardHTML).join('')}</div>`
    : `<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">아직 수집된 문장이 없어요.<br>마음에 닿은 문장을 추가해 보세요.</div></div>`;
}

function renderCollection() {
  updateCount();
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = sentences;
  if (currentFilter !== '전체') filtered = filtered.filter(s => s.tags.includes(currentFilter));
  if (q) filtered = filtered.filter(s => s.text.toLowerCase().includes(q) || (s.source || '').toLowerCase().includes(q));
  const grid = document.getElementById('collectionGrid');
  grid.innerHTML = filtered.length
    ? filtered.map(cardHTML).join('')
    : `<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">${!sentences.length ? '불러오는 중이에요...' : '검색 결과가 없어요.'}</div></div>`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCollection();
}

function updateCount() { document.getElementById('countBadge').textContent = sentences.length; }

function toggleTag(btn, tag) {
  btn.classList.toggle('selected');
  selectedTags = btn.classList.contains('selected')
    ? [...selectedTags, tag]
    : selectedTags.filter(t => t !== tag);
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page === 'collection') renderCollection();
}

// ── 모달 ──
function openModalById(id) {
  if (!id) return;
  const s = sentences.find(s => s.id === id);
  if (!s) return;
  currentModalId = id;
  document.getElementById('modalSentence').textContent = s.text;
  document.getElementById('modalNote').value = '';
  const noteEl = document.getElementById('modalExistingNote');
  if (s.note) {
    noteEl.style.display = 'block';
    document.getElementById('modalNoteText').textContent = s.note;
  } else {
    noteEl.style.display = 'none';
  }
  const starBtn = document.getElementById('modalStarBtn');
  starBtn.textContent = s.starred ? '★' : '☆';
  starBtn.className = 'action-btn star-btn' + (s.starred ? ' starred' : '');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveNote() {
  const note = document.getElementById('modalNote').value.trim();
  if (!note) { closeModal(); return; }
  const s = sentences.find(s => s.id === currentModalId);
  if (s) {
    s.note = note;
    localStorage.setItem('sentences_cache', JSON.stringify(sentences));
  }
  closeModal();
  renderRecent();
  showToast('감상이 저장됐어요');
}

function toggleStar() {
  const s = sentences.find(s => s.id === currentModalId);
  if (!s) return;
  s.starred = !s.starred;
  localStorage.setItem('sentences_cache', JSON.stringify(sentences));
  const btn = document.getElementById('modalStarBtn');
  btn.textContent = s.starred ? '★' : '☆';
  btn.className = 'action-btn star-btn' + (s.starred ? ' starred' : '');
}

// ── 유틸 ──
function showLoading(v) { document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none'; }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadSentences();
</script>
</body>
</html>
