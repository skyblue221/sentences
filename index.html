<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장 수집함</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #7eb8d4;
    --lavender-light: #c8e4f0;
    --lavender-pale: #eaf4f9;
    --rose: #89c4d4;
    --rose-light: #cce8f0;
    --rose-pale: #e8f5f9;
    --sage: #a0c8d8;
    --text-dark: #1a2e38;
    --text-mid: #3a5a6a;
    --text-soft: #6a94a8;
    --bg: #f4f9fc;
    --card-bg: #fafdff;
    --border: #c0dce8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text-dark);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 20%, rgba(126,184,212,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 500px 350px at 85% 75%, rgba(137,196,212,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative; z-index: 10;
    padding: 36px 48px 0;
    display: flex; align-items: baseline; gap: 16px;
  }
  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.3em;
    color: var(--text-soft); text-transform: uppercase;
  }
  .app-subtitle {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 300;
    color: var(--text-mid); letter-spacing: 0.05em;
  }
  nav {
    position: relative; z-index: 10;
    padding: 28px 48px 0;
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 22px; font-size: 13px; font-weight: 300;
    color: var(--text-soft); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.25s ease; letter-spacing: 0.06em;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Noto Sans KR', sans-serif; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text-mid); }
  .tab.active { color: var(--text-dark); border-bottom-color: var(--lavender); font-weight: 400; }
  main { position: relative; z-index: 10; padding: 40px 48px; max-width: 900px; margin: 0 auto; }
  .section-label {
    font-size: 11px; letter-spacing: 0.25em; color: var(--text-soft);
    text-transform: uppercase; margin-bottom: 20px;
    font-family: 'Playfair Display', serif;
  }
  .feature-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 52px 56px;
    position: relative; overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer; min-height: 220px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .feature-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--lavender), var(--rose), var(--sage));
    opacity: 0.7;
  }
  .feature-card::after {
    content: '"'; position: absolute; top: 28px; right: 40px;
    font-family: 'Playfair Display', serif; font-size: 96px;
    color: var(--lavender-light); line-height: 1; pointer-events: none;
  }
  .feature-card:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(142,120,155,0.1); }
  .card-sentence {
    font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 300;
    line-height: 1.9; color: var(--text-dark); letter-spacing: 0.04em;
    flex: 1; padding-right: 60px;
    transition: opacity 0.3s ease;
  }
  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
  }
  .card-source { font-size: 12px; color: var(--text-soft); letter-spacing: 0.08em; }
  .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { padding: 3px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 0.06em; font-weight: 300; }
  .tag-lavender { background: var(--lavender-light); color: #1a5a7a; }
  .tag-rose { background: var(--rose-light); color: #1a5a6a; }
  .tag-sage { background: #cce8f0; color: #1a5a70; }
  .refresh-btn {
    margin-top: 16px; display: flex; align-items: center; gap: 8px;
    background: none; border: 1px solid var(--border); border-radius: 24px;
    padding: 8px 20px; font-size: 12px; color: var(--text-soft);
    cursor: pointer; transition: all 0.2s ease;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.05em;
  }
  .refresh-btn:hover { border-color: var(--lavender); color: var(--text-mid); background: var(--lavender-pale); }
  .collection-grid { display: grid; gap: 16px; }
  .sentence-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px 32px;
    transition: all 0.2s ease; position: relative;
  }
  .sentence-card:hover { border-color: var(--lavender); box-shadow: 0 4px 20px rgba(142,120,155,0.08); }
  .sentence-card .sentence-text {
    font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 300;
    line-height: 1.85; color: var(--text-dark); letter-spacing: 0.03em; margin-bottom: 16px;
  }
  .sentence-card .sentence-meta { display: flex; align-items: center; justify-content: space-between; }
  .sentence-card .source-info { font-size: 12px; color: var(--text-soft); }
  .card-actions { display: flex; gap: 8px; }
  .action-btn {
    background: none; border: none; cursor: pointer; font-size: 14px;
    padding: 4px 6px; border-radius: 6px; transition: background 0.2s; color: var(--text-soft);
  }
  .action-btn:hover { background: var(--lavender-pale); }
  .add-form { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 40px 44px; }
  .form-row { margin-bottom: 24px; }
  .form-label {
    display: block; font-size: 11px; letter-spacing: 0.18em;
    color: var(--text-soft); text-transform: uppercase; margin-bottom: 10px;
    font-family: 'Playfair Display', serif;
  }
  .form-input, .form-textarea {
    width: 100%; background: var(--lavender-pale); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: 15px;
    font-family: 'Noto Serif KR', serif; font-weight: 300; color: var(--text-dark);
    transition: border-color 0.2s, background 0.2s; outline: none; letter-spacing: 0.03em;
    -webkit-appearance: none; appearance: none; box-sizing: border-box;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--lavender); background: white; }
  .form-textarea { min-height: 120px; resize: vertical; line-height: 1.8; }
  .form-date { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text-dark); cursor: pointer; }
  .tag-selector { display: flex; gap: 10px; flex-wrap: wrap; }
  .tag-option {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    background: white; color: var(--text-soft); font-family: 'Noto Sans KR', sans-serif;
  }
  .tag-option.selected { border-color: var(--lavender); background: var(--lavender-light); color: #1a5a7a; }
  .submit-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    border: none; border-radius: 12px; color: white; font-size: 14px;
    letter-spacing: 0.12em; cursor: pointer; transition: opacity 0.2s, transform 0.2s;
    font-family: 'Noto Sans KR', sans-serif; font-weight: 400; margin-top: 8px;
  }
  .submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .filter-bar { display: flex; gap: 12px; margin-bottom: 28px; align-items: center; }
  .search-input {
    flex: 1; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 18px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-dark);
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--lavender); }
  .filter-tag {
    padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; cursor: pointer; background: white; color: var(--text-soft);
    transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
  }
  .filter-tag.active { background: var(--lavender-light); border-color: var(--lavender); color: #1a5a7a; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-soft); }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 14px; line-height: 2; font-weight: 300; }
  .page { display: none; animation: fadeIn 0.35s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .count-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--lavender-light); color: #1a5a7a; border-radius: 12px;
    padding: 2px 10px; font-size: 11px; margin-left: 8px; font-weight: 400;
  }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(61,53,64,0.35); backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.25s ease; }
  .modal {
    background: var(--card-bg); border-radius: 24px; padding: 52px;
    max-width: 540px; width: 90%; position: relative; border: 1px solid var(--border);
  }
  .modal-close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text-soft); transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text-dark); }
  .modal-sentence {
    font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 300;
    line-height: 1.9; color: var(--text-dark); letter-spacing: 0.04em; margin-bottom: 28px;
  }
  .modal-note-label {
    font-size: 11px; letter-spacing: 0.2em; color: var(--text-soft);
    text-transform: uppercase; margin-bottom: 10px; font-family: 'Playfair Display', serif;
  }
  .modal-note-input {
    width: 100%; background: var(--lavender-pale); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-dark);
    outline: none; min-height: 80px; resize: none; line-height: 1.7;
    transition: border-color 0.2s;
  }
  .modal-note-input:focus { border-color: var(--lavender); background: white; }
  .modal-save-btn {
    margin-top: 18px; padding: 12px 28px; background: var(--lavender);
    border: none; border-radius: 10px; color: white; font-size: 13px;
    cursor: pointer; transition: opacity 0.2s; font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.06em;
  }
  .modal-save-btn:hover { opacity: 0.85; }
  .star-btn { font-size: 16px; }
  .starred { color: #d4b060; }

  /* 상태 토스트 */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-dark); color: white; padding: 12px 24px;
    border-radius: 24px; font-size: 13px; opacity: 0;
    transition: all 0.3s ease; z-index: 200; pointer-events: none;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.04em;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #b07070; }

  /* 로딩 스피너 */
  .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    position: fixed; inset: 0; background: rgba(250,248,246,0.7);
    backdrop-filter: blur(4px); z-index: 50;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loading-text { font-size: 14px; color: var(--text-mid); font-weight: 300; letter-spacing: 0.08em; }
  .loading-dot {
    width: 32px; height: 32px; border: 2px solid var(--lavender);
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }



  /* 문장 선택 목록 */
  .extracted-list { display: none; margin-bottom: 16px; }
  .extracted-list-label {
    font-size: 11px; letter-spacing: 0.18em; color: var(--text-soft);
    text-transform: uppercase; margin-bottom: 12px;
    font-family: 'Playfair Display', serif;
  }
  .extracted-item {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 8px;
    font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 300;
    line-height: 1.75; color: var(--text-dark); cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.03em;
  }
  .extracted-item:hover { border-color: var(--lavender); background: var(--lavender-pale); }
  .extracted-item.selected { border-color: var(--lavender); background: var(--lavender-light); color: #1a5a7a; }


  /* 설정 배너 */
  .setup-banner {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--text-dark); color: white; padding: 20px 24px;
    z-index: 300; flex-direction: column; gap: 12px;
    border-radius: 20px 20px 0 0;
  }
  .setup-banner-title { font-size: 14px; font-weight: 400; letter-spacing: 0.05em; }
  .setup-banner-desc { font-size: 12px; opacity: 0.7; line-height: 1.6; }
  .setup-input-row { display: flex; gap: 10px; }
  .setup-input {
    flex: 1; padding: 10px 14px; border-radius: 8px; border: none;
    font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
    background: rgba(255,255,255,0.15); color: white; outline: none;
  }
  .setup-input::placeholder { color: rgba(255,255,255,0.45); }
  .setup-save-btn {
    padding: 10px 18px; background: var(--lavender); border: none;
    border-radius: 8px; color: white; font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
  }
  .setup-skip { font-size: 11px; opacity: 0.5; cursor: pointer; text-align: right; }
  .setup-skip:hover { opacity: 0.8; }

  /* 사진 추출 */
  .photo-upload-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.2s; background: var(--lavender-pale);
    position: relative; margin-bottom: 12px;
  }
  .photo-upload-area:hover { border-color: var(--lavender); background: var(--rose-pale); }
  .photo-upload-area.dragging { border-color: var(--lavender); background: var(--lavender-light); }
  .photo-upload-icon { font-size: 28px; margin-bottom: 8px; }
  .photo-upload-text { font-size: 13px; color: var(--text-soft); line-height: 1.6; }
  .photo-upload-text strong { color: var(--text-mid); font-weight: 400; }
  #photoFileInput { display: none; }
  .photo-preview {
    width: 100%; max-height: 200px; object-fit: contain;
    border-radius: 10px; margin-bottom: 10px; display: none;
  }
  .extract-btn {
    width: 100%; padding: 12px; margin-bottom: 16px;
    background: var(--lavender-pale); border: 1px solid var(--lavender);
    border-radius: 10px; color: var(--text-mid); font-size: 13px;
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.06em; display: none;
  }
  .extract-btn:hover { background: var(--lavender-light); }
  .extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; color: var(--text-soft); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 640px) {
    header { padding: 24px 20px 0; }
    nav { padding: 20px 20px 0; }
    main { padding: 28px 20px; }
    .feature-card { padding: 36px 28px; }
    .card-sentence { font-size: 17px; }
    .form-row-half { grid-template-columns: 1fr; }
    .add-form { padding: 28px 24px; }
    .modal { padding: 36px 28px; }
    .filter-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <span class="app-title">Anthology</span>
  <span class="app-subtitle">나의 문장 수집함</span>
</header>

<nav>
  <button class="tab active" onclick="showPage('home', this)">오늘의 문장</button>
  <button class="tab" onclick="showPage('collection', this)">수집함 <span class="count-badge" id="countBadge">—</span></button>
  <button class="tab" onclick="showPage('add', this)">문장 추가</button>
</nav>

<main>
  <!-- 홈 -->
  <div class="page active" id="page-home">
    <div style="margin-bottom:48px;">
      <div class="section-label">오늘 꺼내 본 문장</div>
      <div class="feature-card" id="randomCard" onclick="openModalById(currentModalId)">
        <div class="card-sentence" id="randomSentence">노션에서 문장을 불러오는 중...</div>
        <div class="card-meta">
          <div class="card-source" id="randomSource">—</div>
          <div class="card-tags" id="randomTags"></div>
        </div>
      </div>
      <button class="refresh-btn" onclick="showRandom()">↻ 다른 문장 보기</button>
    </div>
    <div>
      <div class="section-label">최근 수집</div>
      <div id="recentPreview"></div>
    </div>
  </div>

  <!-- 수집함 -->
  <div class="page" id="page-collection">
    <div class="filter-bar">
      <input class="search-input" type="text" placeholder="문장, 출처로 검색..." id="searchInput" oninput="renderCollection()">
      <button class="filter-tag active" onclick="setFilter('전체', this)">전체</button>
      <button class="filter-tag" onclick="setFilter('일상', this)">일상</button>
      <button class="filter-tag" onclick="setFilter('문학', this)">문학</button>
      <button class="filter-tag" onclick="setFilter('시', this)">시</button>
      <button class="filter-tag" onclick="setFilter('영화', this)">영화</button>
    </div>
    <div class="collection-grid" id="collectionGrid"></div>
  </div>

  <!-- 추가 -->
  <div class="page" id="page-add">
    <div class="add-form">
      <div class="section-label" style="margin-bottom:28px;">새 문장 기록하기</div>
      <div class="form-row">
        <label class="form-label">사진에서 추출</label>
        <div class="photo-upload-area" id="photoUploadArea" onclick="document.getElementById('photoFileInput').click()">
          <input type="file" id="photoFileInput" accept="image/*" capture="environment" onchange="onPhotoSelected(event)">
          <img class="photo-preview" id="photoPreview">
          <div id="photoUploadPrompt">
            <div class="photo-upload-icon">📷</div>
            <div class="photo-upload-text"><strong>사진 촬영 또는 업로드</strong><br>책, 메모, 화면 어디서든 문장을 찍어보세요</div>
          </div>
        </div>
        <button class="extract-btn" id="extractBtn" onclick="extractText()">✦ 텍스트 추출하기</button>
        <div class="extracted-list" id="extractedList">
          <div class="extracted-list-label">문장을 선택하세요</div>
          <div id="extractedItems"></div>
        </div>
      </div>

      <div class="divider">또는 직접 입력</div>

      <div class="form-row">
        <label class="form-label">문장</label>
        <textarea class="form-textarea" id="inputSentence" placeholder="마음에 닿은 문장을 여기에..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">출처</label>
        <input class="form-input" type="text" id="inputSource" placeholder="책, 영화, 일상...">
      </div>
      <div class="form-row">
        <label class="form-label">날짜</label>
        <input class="form-input form-date" type="date" id="inputDate">
      </div>
      <div class="form-row">
        <label class="form-label">분류</label>
        <div class="tag-selector">
          <button class="tag-option" onclick="toggleTag(this,'일상')">일상</button>
          <button class="tag-option" onclick="toggleTag(this,'문학')">문학</button>
          <button class="tag-option" onclick="toggleTag(this,'시')">시</button>
          <button class="tag-option" onclick="toggleTag(this,'영화')">영화</button>
          <button class="tag-option" onclick="toggleTag(this,'음악')">음악</button>
          <button class="tag-option" onclick="toggleTag(this,'사유')">사유</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">감상 메모</label>
        <textarea class="form-textarea" id="inputNote" placeholder="이 문장이 마음에 닿은 이유..." style="min-height:80px;"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="addSentence()">문장 수집하기</button>
    </div>
  </div>
</main>

<!-- 감상 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-sentence" id="modalSentence"></div>
    <div id="modalExistingNote" style="display:none; margin-bottom:20px;">
      <div class="modal-note-label">감상 메모</div>
      <div style="font-size:14px;color:var(--text-mid);line-height:1.7;padding:14px 18px;background:var(--rose-pale);border-radius:10px;" id="modalNoteText"></div>
    </div>
    <div class="modal-note-label">감상 추가</div>
    <textarea class="modal-note-input" id="modalNote" placeholder="오늘의 감상을 남겨보세요..."></textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;">
      <button class="modal-save-btn" onclick="saveNote()">저장</button>
      <button class="action-btn star-btn" id="modalStarBtn" onclick="toggleStar()" style="font-size:22px;">☆</button>
    </div>
  </div>
</div>

<!-- 설정 배너 -->
<div class="setup-banner" id="setupBanner">
  <div class="setup-banner-title">📋 Google Sheets 연결하기</div>
  <div class="setup-banner-desc">Apps Script 웹앱 URL을 입력하면 어디서든 문장이 저장돼요.<br>아직 설정 안 했다면 건너뛰고 나중에 연결할 수 있어요.</div>
  <div class="setup-input-row">
    <input class="setup-input" id="gasUrlInput" placeholder="https://script.google.com/macros/s/...">
    <button class="setup-save-btn" onclick="saveGasUrl()">연결</button>
  </div>
  <div class="setup-skip" onclick="document.getElementById('setupBanner').style.display='none'">건너뛰기 (로컬 저장)</div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-dot"></div>
  <div class="loading-text">노션에서 불러오는 중...</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── Google Sheets 설정 ──
// 아래 SHEET_ID는 이미 생성된 시트예요. 공유 설정만 해주세요 (안내 참고)
const SHEET_ID = "1sWWy8aRSDYZWZVc9tgZT6BrCcFtuTOWLIxUD7b_WT_o";
const SHEET_NAME = "Sheet1";
// Google Apps Script 웹앱 URL — 배포 후 아래에 붙여넣기
let GAS_URL = localStorage.getItem('gasUrl') || '';

let sentences = [];
let currentFilter = '전체';
let currentModalId = null;
let selectedTags = [];

document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

// ── GAS URL 설정 확인 ──
function checkSetup() {
  if (!GAS_URL) {
    document.getElementById('setupBanner').style.display = 'flex';
  }
}

function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url.startsWith('https://script.google.com/macros/s/AKfycbzhxFT-zzg8d93FXQ6drRjClEp-DQwBNgjT1h6k-9eRzQqeNTtwnGxKVpYFCv-1keek/exec')) {
    showToast('올바른 Apps Script URL을 입력해주세요.', true);
    return;
  }
  GAS_URL = url;
  localStorage.setItem('gasUrl', url);
  document.getElementById('setupBanner').style.display = 'none';
  showToast('연결됐어요! 데이터를 불러올게요.');
  loadSentences();
}

// ── 데이터 불러오기 ──
async function loadSentences() {
  if (!GAS_URL) {
    sentences = JSON.parse(localStorage.getItem('sentences_backup') || '[]');
    updateCount(); showRandom(); renderRecent();
    return;
  }
  showLoading(true);
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const data = await res.json();
    sentences = (data || []).map(s => ({
      id: s.id || String(Date.now()),
      text: s.text || '',
      source: s.source || '',
      tags: s.tags ? s.tags.split(',').filter(Boolean) : [],
      date: s.date || '',
      note: s.note || '',
      starred: s.starred === 'true' || s.starred === true
    }));
    localStorage.setItem('sentences_backup', JSON.stringify(sentences));
    updateCount(); showRandom(); renderRecent();
  } catch(e) {
    // 오프라인이면 로컬 캐시 사용
    sentences = JSON.parse(localStorage.getItem('sentences_backup') || '[]');
    updateCount(); showRandom(); renderRecent();
    showToast('오프라인 모드 — 캐시 데이터를 표시해요', false);
  } finally {
    showLoading(false);
  }
}

// ── 문장 추가 ──
async function addSentence() {
  const text = document.getElementById('inputSentence').value.trim();
  if (!text) { showToast('문장을 입력해주세요.', true); return; }
  const source = document.getElementById('inputSource').value.trim();
  const date = document.getElementById('inputDate').value;
  const note = document.getElementById('inputNote').value.trim();
  const tags = [...selectedTags];
  const id = String(Date.now());

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>저장 중...';

  const newItem = { id, text, source, tags, date, note, starred: false };

  try {
    if (GAS_URL) {
      await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'add', id, text, source, tags: tags.join(','), date, note, starred: false })
      });
    }
    sentences.unshift(newItem);
    localStorage.setItem('sentences_backup', JSON.stringify(sentences));
    updateCount();

    document.getElementById('inputSentence').value = '';
    document.getElementById('inputSource').value = '';
    document.getElementById('inputNote').value = '';
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    selectedTags = [];
    document.querySelectorAll('.tag-option').forEach(b => b.classList.remove('selected'));
    // 사진 초기화
    photoBase64 = null;
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('photoPreview').src = '';
    document.getElementById('photoUploadPrompt').style.display = 'block';
    document.getElementById('extractBtn').style.display = 'none';
    document.getElementById('extractedList').style.display = 'none';
    document.getElementById('photoFileInput').value = '';

    showToast('✦ 저장됐어요');
    showPage('home', document.querySelector('.tab'));
    showRandom(); renderRecent();
  } catch(e) {
    showToast('저장 실패. 다시 시도해주세요.', true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '문장 수집하기';
  }
}

// ── 즐겨찾기 토글 ──
async function toggleStarById(e, id) {
  e.stopPropagation();
  const s = sentences.find(s => s.id === id);
  if (!s) return;
  s.starred = !s.starred;
  localStorage.setItem('sentences_backup', JSON.stringify(sentences));
  renderCollection(); renderRecent();
  if (GAS_URL) {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'update', id, starred: s.starred })
      });
    } catch(e) {}
  }
}

// ── UI ──
function showRandom() {
  if (sentences.length === 0) {
    document.getElementById('randomSentence').textContent = '아직 수집된 문장이 없어요. 마음에 닿은 문장을 추가해 보세요.';
    document.getElementById('randomSource').textContent = '';
    document.getElementById('randomTags').innerHTML = '';
    currentModalId = null;
    return;
  }
  const s = sentences[Math.floor(Math.random() * sentences.length)];
  const el = document.getElementById('randomSentence');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = s.text;
    document.getElementById('randomSource').textContent = s.source ? '— ' + s.source : '';
    document.getElementById('randomTags').innerHTML = s.tags.map(t => `<span class="tag ${tagClass(t)}">${t}</span>`).join('');
    el.style.transition = 'opacity 0.4s ease';
    el.style.opacity = '1';
    currentModalId = s.id;
  }, 180);
}

function tagClass(tag) {
  const map = { '일상':'tag-sage','문학':'tag-lavender','시':'tag-lavender','영화':'tag-rose','음악':'tag-rose','사유':'tag-lavender' };
  return map[tag] || 'tag-lavender';
}

function renderRecent() {
  const el = document.getElementById('recentPreview');
  const recent = [...sentences].sort((a,b) => new Date(b.date||0) - new Date(a.date||0)).slice(0,2);
  if (recent.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">아직 수집된 문장이 없어요.<br>마음에 닿은 문장을 추가해 보세요.</div></div>`;
    return;
  }
  el.innerHTML = `<div class="collection-grid">${recent.map(cardHTML).join('')}</div>`;
}

function cardHTML(s) {
  const safeId = s.id.replace(/'/g, "\'");
  return `<div class="sentence-card" onclick="openModalById('${safeId}')">
    <div class="sentence-text">${s.text}</div>
    <div class="sentence-meta">
      <div class="source-info">${s.source ? '— '+s.source : ''} <span style="margin-left:8px;opacity:0.6;">${s.date||''}</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="display:flex;gap:6px;">${s.tags.map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join('')}</div>
        <button class="action-btn star-btn ${s.starred?'starred':''}" onclick="toggleStarById(event,'${safeId}')">${s.starred?'★':'☆'}</button>
      </div>
    </div>
    ${s.note ? `<div style="margin-top:14px;padding:12px 16px;background:var(--lavender-pale);border-radius:8px;font-size:13px;color:var(--text-mid);line-height:1.7;">${s.note}</div>` : ''}
  </div>`;
}

function renderCollection() {
  updateCount();
  const grid = document.getElementById('collectionGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = sentences;
  if (currentFilter !== '전체') filtered = filtered.filter(s => s.tags.includes(currentFilter));
  if (q) filtered = filtered.filter(s => s.text.toLowerCase().includes(q) || (s.source||'').toLowerCase().includes(q));
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">${sentences.length === 0 ? '불러오는 중이에요...' : '검색 결과가 없어요.'}</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(cardHTML).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCollection();
}

function updateCount() {
  document.getElementById('countBadge').textContent = sentences.length;
}

function toggleTag(btn, tag) {
  btn.classList.toggle('selected');
  if (btn.classList.contains('selected')) selectedTags.push(tag);
  else selectedTags = selectedTags.filter(t => t !== tag);
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page === 'collection') renderCollection();
}

function openModalById(id) {
  if (!id) return;
  const s = sentences.find(s => s.id === id);
  if (!s) return;
  currentModalId = id;
  document.getElementById('modalSentence').textContent = s.text;
  document.getElementById('modalNote').value = '';
  const noteEl = document.getElementById('modalExistingNote');
  if (s.note) { noteEl.style.display='block'; document.getElementById('modalNoteText').textContent = s.note; }
  else noteEl.style.display = 'none';
  const starBtn = document.getElementById('modalStarBtn');
  starBtn.textContent = s.starred ? '★' : '☆';
  starBtn.className = 'action-btn star-btn' + (s.starred ? ' starred' : '');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveNote() {
  const note = document.getElementById('modalNote').value.trim();
  if (!note) { closeModal(); return; }
  const s = sentences.find(s => s.id === currentModalId);
  if (s) {
    s.note = note;
    localStorage.setItem('sentences_backup', JSON.stringify(sentences));
  }
  closeModal();
  renderRecent();
  showToast('감상이 저장됐어요');
}

function toggleStar() {
  const s = sentences.find(s => s.id === currentModalId);
  if (!s) return;
  s.starred = !s.starred;
  localStorage.setItem('sentences_backup', JSON.stringify(sentences));
  const btn = document.getElementById('modalStarBtn');
  btn.textContent = s.starred ? '★' : '☆';
  btn.className = 'action-btn star-btn' + (s.starred ? ' starred' : '');
}

function showLoading(v) {
  document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none';
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── 사진 텍스트 추출 (API 키 있을 때만 작동) ──
let photoBase64 = null;

function onPhotoSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    photoBase64 = ev.target.result.split(',')[1];
    const preview = document.getElementById('photoPreview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('photoUploadPrompt').style.display = 'none';
    document.getElementById('extractBtn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

const uploadArea = document.getElementById('photoUploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragging'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragging'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragging');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    onPhotoSelected({ target: { files: [file] } });
  }
});

async function extractText() {
  if (!photoBase64) return;
  const apiKey = localStorage.getItem('anthropicKey') || '';
  if (!apiKey) {
    showToast('텍스트 추출은 Anthropic API 키가 필요해요.', true);
    return;
  }
  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>추출 중...';
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-opus-4-6",
        max_tokens: 2000,
        system: `이미지에서 읽을 수 있는 모든 문장을 추출해주세요.
규칙:
- 문장 단위로 분리해서 JSON 배열로만 반환
- 형식: ["문장1", "문장2", "문장3"]
- 너무 짧은 단어(3글자 이하)나 페이지 번호, 기호만 있는 항목은 제외
- 설명, 부연, 마크다운 없이 JSON만 반환`,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: photoBase64 } },
          { type: "text", text: "이미지의 문장들을 JSON 배열로 추출해주세요." }
        ]}]
      })
    });
    const data = await res.json();
    const raw = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
    let extracted = [];
    try { extracted = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e) { extracted = raw.split('\n').map(s => s.trim()).filter(s => s.length > 3); }
    if (extracted.length > 0) {
      showExtractedList(extracted);
      showToast('✦ ' + extracted.length + '개 문장을 찾았어요');
    } else {
      showToast('텍스트를 찾지 못했어요.', true);
    }
  } catch(e) {
    showToast('추출 실패. 다시 시도해주세요.', true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↻ 다시 추출하기';
  }
}

function showExtractedList(list) {
  const listEl = document.getElementById('extractedList');
  const itemsEl = document.getElementById('extractedItems');
  itemsEl.innerHTML = list.map((s, i) =>
    `<div class="extracted-item" onclick="selectExtracted(this, ${JSON.stringify(s)})">
      <span style="font-size:10px;color:var(--text-soft);margin-right:8px;">${i+1}</span>${s}
    </div>`
  ).join('');
  listEl.style.display = 'block';
}

function selectExtracted(el, text) {
  document.querySelectorAll('.extracted-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('inputSentence').value = text;
  document.getElementById('inputSentence').scrollIntoView({ behavior: 'smooth', block: 'center' });
  showToast('✦ 문장이 입력됐어요');
}

// 초기 로드
checkSetup();
loadSentences();
</script>
</body>
</html>
